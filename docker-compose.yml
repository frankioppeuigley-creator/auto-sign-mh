services:
  redis:
    image: redis:7-alpine
    container_name: auto-sign-redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: auto-sign-app
    restart: always
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    volumes:
      - ./config.json:/app/config.json
      - ./logs:/app/logs

volumes:
  redis_data:
